<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Bot - 성과 대시보드</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0e1a; color:#e0e6ff; font-family:'Segoe UI',sans-serif; padding:24px; }
  h1 { font-size:1.6rem; color:#7dd3fc; margin-bottom:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
  .card { background:linear-gradient(135deg,#1e2a4a,#162038); border:1px solid #2a3a60;
          border-radius:14px; padding:20px; }
  .card .label { font-size:.8rem; color:#94a3b8; margin-bottom:6px; }
  .card .value { font-size:2rem; font-weight:700; }
  .green { color:#34d399; } .red { color:#f87171; } .blue { color:#60a5fa; } .yellow { color:#fbbf24; }
  table { width:100%; border-collapse:collapse; background:#111827; border-radius:12px; overflow:hidden; }
  th { background:#1e2a4a; padding:12px 16px; font-size:.8rem; color:#94a3b8; text-align:left; }
  td { padding:12px 16px; font-size:.85rem; border-bottom:1px solid #1e2a4a; }
  .badge { padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
  .win  { background:#064e3b; color:#34d399; }
  .loss { background:#7f1d1d; color:#f87171; }
  .status-bar { display:flex; justify-content:space-between; align-items:center;
                background:#1e2a4a; border-radius:10px; padding:12px 20px; margin-bottom:20px; }
  .dot { width:10px;height:10px;border-radius:50%;background:#34d399;
         animation:pulse 1.5s infinite; display:inline-block; margin-right:8px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<h1>⚡ Alpha Bot v3.0 — 실시간 성과 대시보드</h1>

<div class="status-bar">
  <span><span class="dot"></span> 봇 가동 중</span>
  <span id="updated" style="color:#64748b;font-size:.8rem;"></span>
</div>

<div class="grid">
  <div class="card"><div class="label">총 거래 횟수</div><div class="value blue" id="total">-</div></div>
  <div class="card"><div class="label">승률</div><div class="value green" id="winrate">-</div></div>
  <div class="card"><div class="label">누적 수익률</div><div class="value" id="pnl">-</div></div>
  <div class="card"><div class="label">총 손실 횟수</div><div class="value red" id="losses">-</div></div>
</div>

<table>
  <thead><tr><th>항목</th><th>값</th></tr></thead>
  <tbody id="stats-body"><tr><td colspan="2" style="color:#64748b;">데이터 로딩 중...</td></tr></tbody>
</table>

<script>
async function loadStats() {
  try {
    // 실제 구현 시 stats JSON을 fetch로 읽어옴
    // 여기서는 로컬 파일 시뮬레이션
    const mockData = {
      total_trades: parseInt(document.getElementById('total').innerText) || 0,
      wins: 0, losses: 0, total_pnl: 0.0
    };
    // TODO: fetch('/trading_stats.json').then(r=>r.json())
    document.getElementById('updated').innerText = '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR');
  } catch(e) {}
}
loadStats();
setInterval(loadStats, 10000);

document.getElementById('updated').innerText = '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR');
</script>
</body>
</html>
