<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 Browser Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: #3b82f6;
            --secondary-glow: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
            animation: scan 4s infinite linear;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            align-self: center;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            min-height: 150px;
            display: none;
            flex-direction: column;
        }

        .result-box.active {
            display: flex;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .status-dot.loading {
            background-color: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(0.8); }
        }

        .result-content {
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Gemma 4 Browser Agent</h1>
            <p class="subtitle">로컬 AI가 웹사이트를 대신 탐색하고 분석합니다.</p>
        </header>

        <div class="input-group">
            <label for="url">🌐 분석할 웹사이트 URL</label>
            <input type="text" id="url" placeholder="https://news.naver.com" value="https://news.naver.com">
        </div>

        <div class="input-group">
            <label for="prompt">💡 AI에게 내릴 지시사항</label>
            <textarea id="prompt" placeholder="이 페이지의 핵심 내용을 3가지로 요약해줘.">이 페이지의 핵심 내용을 3가지로 요약해줘.</textarea>
        </div>

        <button id="submitBtn" onclick="runAgent()">🚀 에이전트 가동</button>

        <div class="result-box" id="resultBox">
            <div class="result-header">
                <div class="status-dot" id="statusDot"></div>
                <strong id="statusText">결과 대기 중...</strong>
            </div>
            <div class="result-content" id="resultContent">
                여기에 AI의 분석 결과가 표시됩니다.
            </div>
        </div>
    </div>

    <script>
        async function runAgent() {
            const url = document.getElementById('url').value;
            const prompt = document.getElementById('prompt').value;
            const submitBtn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const resultContent = document.getElementById('resultContent');

            if (!url) {
                alert('URL을 입력해주세요.');
                return;
            }

            // UI 상태 변경 (로딩 중)
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
            resultBox.classList.add('active');
            statusDot.className = 'status-dot loading';
            statusText.innerText = '에이전트가 웹페이지를 분석하고 있습니다. (약 30~60초 소요)';
            resultContent.innerText = '브라우저를 열고 데이터를 수집 중입니다...';

            try {
                // API 호출
                const response = await fetch('/api/browse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url, prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDot.className = 'status-dot';
                    statusText.innerText = '분석 완료';
                    resultContent.innerText = data.result;
                } else {
                    statusDot.className = 'status-dot';
                    statusDot.style.backgroundColor = '#ef4444';
                    statusDot.style.boxShadow = '0 0 10px #ef4444';
                    statusText.innerText = '오류 발생';
                    resultContent.innerText = data.error || '알 수 없는 오류가 발생했습니다.';
                }
            } catch (error) {
                statusDot.className = 'status-dot';
                statusDot.style.backgroundColor = '#ef4444';
                statusDot.style.boxShadow = '0 0 10px #ef4444';
                statusText.innerText = '서버 연결 실패';
                resultContent.innerText = '서버가 실행 중인지 확인해주세요. (python src/automation/browser_server.py)';
            } finally {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
